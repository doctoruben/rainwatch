name: RainWatch Daily Alert

on:
  schedule:
    - cron: '0 20 * * *'  # 20:00 UTC (Canarias invierno=UTC, verano=UTC+1)
  workflow_dispatch:   # Permite ejecutar manualmente desde GitHub

jobs:
  check-rain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check rain and notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          THRESHOLD: ${{ secrets.THRESHOLD }}
          MUNICIPALITIES: ${{ secrets.MUNICIPALITIES }}
        run: node .github/scripts/check-rain.js
